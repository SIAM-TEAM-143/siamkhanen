<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Amar Task</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 360px; background: #ffffff; min-height: 100vh; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
        
        /* ফেসবুক প্রোফাইল ব্যাকগ্রাউন্ড / কাভার ফটো স্টাইল হেডার */
        .login-header { 
            position: relative;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.55)), 
                        url('task.png');
            background-size: cover;
            background-position: center;
            color: white; 
            padding: 50px 20px 30px 20px; 
            text-align: center; 
            border-bottom-left-radius: 25px; 
            border-bottom-right-radius: 25px; 
            box-shadow: inset 0 -20px 30px rgba(0,0,0,0.2);
        }
        
        /* প্রোফাইল অবতার আইকন */
        .login-header i { 
            font-size: 55px; 
            margin-bottom: 8px; 
            color: #ffffff;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
        }
        .login-header h2 { margin: 0; font-size: 24px; font-weight: 600; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .login-header p { font-size: 12px; opacity: 0.95; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

        .form-section { padding: 30px 20px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 500; }
        .input-group input { 
            width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #ddd; 
            border-radius: 10px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: #00a651; box-shadow: 0 0 5px rgba(0,166,81,0.2); }
        .input-group i.input-icon { position: absolute; left: 12px; top: 38px; color: #00a651; }
        .input-group i.toggle-pass { position: absolute; right: 12px; top: 38px; color: #999; cursor: pointer; }

        .btn-login { 
            width: 100%; background: #00a651; color: white; border: none; padding: 15px; 
            border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; 
            transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 12px rgba(0,166,81,0.2); 
            display: flex; justify-content: center; align-items: center; gap: 10px; 
        }
        .btn-login:disabled { background: #66bb6a; cursor: not-allowed; }

        #msg { 
            text-align: center; font-size: 13px; margin-bottom: 15px; 
            padding: 10px; border-radius: 8px; display: none; font-weight: 500; 
        }

        /* High-Level Advanced Loader Overlay */
        #loader-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); 
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; 
        }
        .high-loader {
            position: relative; width: 80px; height: 80px;
            display: flex; align-items: center; justify-content: center;
        }
        .high-loader .ring {
            position: absolute; width: 100%; height: 100%;
            border: 4px solid transparent; border-top-color: #00a651; border-bottom-color: #00a651;
            border-radius: 50%; animation: advanced-spin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }
        .high-loader .inner-ring {
            position: absolute; width: 55px; height: 55px;
            border: 4px solid transparent; border-left-color: #ffffff; border-right-color: #ffffff;
            border-radius: 50%; animation: advanced-spin-reverse 1s linear infinite;
        }
        .high-loader i { color: #ffffff; font-size: 22px; animation: pulse 1.5s ease-in-out infinite; }
        
        .loader-text { color: #ffffff; font-weight: 600; font-size: 15px; margin-top: 20px; letter-spacing: 1px; }

        .btn-spin { 
            width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); 
            border-top: 2px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; 
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes advanced-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes advanced-spin-reverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.15); opacity: 1; } }

        .footer-links { text-align: center; margin-top: 25px; font-size: 14px; color: #666; }
        .footer-links a { color: #00a651; text-decoration: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<!-- High-Level Advanced Loader System -->
<div id="loader-overlay">
    <div class="high-loader">
        <div class="ring"></div>
        <div class="inner-ring"></div>
        <i class="fa-solid fa-shield-halved"></i>
    </div>
    <div class="loader-text">SECURITY VERIFYING...</div>
</div>

<div class="container">
    <!-- ফেসবুক কাভার ফটো স্টাইল হেডার -->
    <div class="login-header">
        <i class="fa-solid fa-circle-user"></i>
        <h2>Welcome Back</h2>
        <p>Login with your email and password</p>
    </div>

    <div class="form-section">
        <div id="msg"></div>
        
        <div class="input-group">
            <label>Email Address</label>
            <i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" id="email" placeholder="example@mail.com">
        </div>

        <div class="input-group">
            <label>Password</label>
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="Enter password">
            <i class="fa-solid fa-eye-slash toggle-pass" onclick="togglePass()"></i>
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">
            <span id="btnText">LOGIN</span>
            <div id="btnLoader" class="btn-spin"></div>
        </button>

        <div class="footer-links">
            Don't have an account? <a onclick="location.href='register.html'">Sign Up</a>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbyV4futjEJjdAbR3dMNf6dOIhAuj7tTo",
        authDomain: "task-2503d.firebaseapp.com",
        databaseURL: "https://task-2503d-default-rtdb.firebaseio.com",
        projectId: "task-2503d",
        storageBucket: "task-2503d.firebasestorage.app",
        messagingSenderId: "707479242322",
        appId: "1:707479242322:web:492db72a3b86653a0d018b",
        measurementId: "G-8DJWDEFEXD"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.handleLogin = async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const btn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const overlay = document.getElementById('loader-overlay');

        if (!email || !password) {
            showMsg("Please fill in all fields!", "error");
            return;
        }

        btn.disabled = true;
        btnText.innerText = "Checking...";
        btnLoader.style.display = "block";

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            const userDoc = await getDoc(doc(db, "users", user.uid));
            
            if (userDoc.exists()) {
                const userData = userDoc.data();
                if (userData.status === "blocked" || userData.status === "Blocked") {
                    throw new Error("Your account has been blocked!");
                }
                localStorage.setItem('user_name', userData.name);
            }

            localStorage.setItem('currentUserId', user.uid);
            
            btnText.innerHTML = 'Success <i class="fa-solid fa-check"></i>';
            btn.style.background = "#2e7d32";
            
            overlay.style.display = 'flex';

            setTimeout(() => {
                window.location.replace('home.html');
            }, 1800);

        } catch (error) {
            let errorMsg = "Login failed!";
            if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                errorMsg = "Invalid email or password!";
            } else if (error.code === 'auth/wrong-password') {
                errorMsg = "Incorrect password!";
            } else {
                errorMsg = error.message;
            }

            showMsg(errorMsg, "error");
            btn.disabled = false;
            btnText.innerText = "LOGIN";
            btnLoader.style.display = "none";
        }
    };

    function showMsg(text, type) {
        const msg = document.getElementById('msg');
        msg.style.display = "block";
        msg.style.background = type === "error" ? "#ffebee" : "#e8f5e9";
        msg.style.color = type === "error" ? "#d32f2f" : "#2e7d32";
        msg.innerText = text;
    }

    window.togglePass = () => {
        const passInput = document.getElementById('password');
        const icon = document.querySelector('.toggle-pass');
        if (passInput.type === "password") {
            passInput.type = "text";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        } else {
            passInput.type = "password";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        }
    };
</script>

</body>
</html>
