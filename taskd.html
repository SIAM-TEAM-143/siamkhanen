<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <script>
        if (!localStorage.getItem('currentUserId')) { window.location.replace('login.html'); }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style> 
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display',-apple-system,BlinkMacSystemFont,Roboto,sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 50px; }

        /* --- VVIP Premium Bottom Loader System --- */
        #loader-overlay { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(150px); width: calc(100% - 40px); max-width: 440px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); padding: 16px 24px; border-radius: 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.2); z-index: 10000; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #loader-overlay.active { transform: translateX(-50%) translateY(0); }
        .vip-spinner { position: relative; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
        .vip-spinner-ring { position: absolute; width: 100%; height: 100%; border: 3px solid rgba(79, 70, 229, 0.2); border-top: 3px solid #6366f1; border-radius: 50%; animation: vipSpin 0.8s linear infinite; }
        .vip-spinner i { color: #6366f1; font-size: 12px; animation: pulse 1.5s infinite; }
        .loader-text { font-size: 13px; font-weight: 700; color: #ffffff; letter-spacing: 0.3px; flex: 1; }
        @keyframes vipSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* --- UI Components --- */
        .top-bar { background: linear-gradient(135deg, #0f172a, #1e1b4b); color: white; padding: 18px 20px; display: flex; align-items: center; gap: 15px; font-size: 16px; font-weight: 700; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .top-bar i { cursor: pointer; font-size: 18px; }

        .task-container { padding: 16px; max-width: 480px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
        .task-view-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .task-large-img { width: 100%; height: 180px; object-fit: cover; background: #f1f5f9; }
        
        .task-details-box { padding: 20px; }
        .details-title { font-size: 18px; font-weight: 800; color: #0f172a; margin-bottom: 6px; }
        .details-reward { font-size: 16px; color: #22c55e; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
        
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .meta-badge { background: #f8fafc; border: 1px solid #f1f5f9; padding: 8px 12px; border-radius: 12px; font-size: 11px; color: #475569; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .meta-badge span { color: #4f46e5; font-weight: 700; }

        .guide-box { background: #f0fdf4; border: 1px dashed #bbf7d0; padding: 14px; border-radius: 16px; margin-bottom: 15px; }
        .guide-title { font-size: 12px; font-weight: 700; color: #16a34a; margin-bottom: 4px; text-transform: uppercase; }
        .task-desc { font-size: 13px; color: #1e293b; line-height: 1.6; }

        .task-link-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: linear-gradient(135deg, #4f46e5, #3730a3); color: white; padding: 14px; border-radius: 14px; text-decoration: none; font-weight: 600; font-size: 14px; box-shadow: 0 4px 15px rgba(79,70,229,0.3); }

        .proof-box { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; display: flex; flex-direction: column; gap: 14px; }
        .proof-title { font-size: 14px; font-weight: 700; color: #0f172a; padding-bottom: 8px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 6px; }
        .proof-title i { color: #4f46e5; }
        
        .proof-group { display: flex; flex-direction: column; gap: 6px; }
        .proof-group label { font-size: 11px; font-weight: 700; color: #64748b; }
        
        .file-wrapper { position: relative; width: 100%; height: 48px; background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 12px; display: flex; align-items: center; padding: 0 15px; cursor: pointer; }
        .file-wrapper input[type="file"] { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .file-wrapper .file-text { font-size: 12px; color: #64748b; display: flex; align-items: center; gap: 8px; }
        .file-wrapper.selected { border-color: #22c55e; background: #f0fdf4; border-style: solid; }

        .proof-group input[type="text"] { width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 13px; background: #f8fafc; outline: none; }
        .proof-group input[type="text"]:focus { border-color: #4f46e5; background: white; }

        .timer-box { font-size: 13px; font-weight: 700; color: #ea580c; background: #fff7ed; padding: 12px; border-radius: 12px; border: 1px dashed #fed7aa; display: flex; align-items: center; justify-content: center; gap: 6px; }

        .action-btn { width: 100%; background: #cbd5e1; color: white; border: none; padding: 15px; border-radius: 14px; font-weight: 700; font-size: 14px; cursor: not-allowed; transition: 0.3s; }
        .action-btn.active { background: linear-gradient(135deg, #22c55e, #16a34a); cursor: pointer; box-shadow: 0 4px 14px rgba(34,197,94,0.3); }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="vip-spinner">
            <div class="vip-spinner-ring"></div>
            <i class="fa-solid fa-crown"></i>
        </div>
        <div class="loader-text" id="loader-msg">Initializing Secure Pipeline...</div>
    </div>

    <div class="top-bar">
        <i class="fa-solid fa-chevron-left" onclick="window.location.href='home.html'"></i>
        <span>Task Details</span>
    </div>

    <div class="task-container">
        <div class="task-view-card">
            <img id="task-img" src="https://via.placeholder.com/400x180" class="task-large-img">
            <div class="task-details-box">
                <h2 class="details-title" id="task-title">Loading Please Wait...</h2>
                <div class="details-reward" id="task-reward"><i class="fa-solid fa-circle-dollar-to-slot"></i> Reward: ৳ 0.00</div>
                
                <div class="meta-grid">
                    <div class="meta-badge"><i class="fa-solid fa-chart-line"></i> Limit: <span id="task-limit">0</span></div>
                    <div class="meta-badge"><i class="fa-solid fa-users-viewfinder"></i> Completed: <span id="global-claims">0</span> users</div>
                </div>
                
                <div class="guide-box">
                    <div class="guide-title"><i class="fa-solid fa-circle-info"></i> Guide Work Notice</div>
                    <p class="task-desc" id="task-description">Please Wait...</p>
                </div>
                
                <a href="#" id="task-link" target="_blank" class="task-link-btn" style="display: none;">
                    <i class="fa-solid fa-arrow-up-right-from-square"></i> Open Task
                </a>
            </div>
        </div>

        <div class="proof-box" id="proof-container" style="display: none;">
            <div class="proof-title"><i class="fa-solid fa-shield-halved"></i> Required Proof Assets</div>
            <div id="dynamic-proof-fields"></div>
        </div>

        <div class="timer-box" id="timer-zone">
            <i class="fa-solid fa-hourglass-start animate-spin"></i> <span id="countdown-text">Please Wait...</span>
        </div>

        <button class="action-btn" id="claim-btn" disabled>Verify & Submit Proof</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDbyV4futjEJjdAbR3dMNf6dOIhAuj7tTo",
            authDomain: "task-2503d.firebaseapp.com",
            projectId: "task-2503d",
            appId: "1:707479242322:web:492db72a3b86653a0d018b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userId = localStorage.getItem('currentUserId');
        const loader = document.getElementById('loader-overlay');
        const loaderMsg = document.getElementById('loader-msg');

        const taskId = new URLSearchParams(window.location.search).get('id');
        let taskRewardAmount = 0;
        let taskNameString = "";
        let expectedImages = 0;

        function showLoader(msg) {
            loaderMsg.innerText = msg;
            loader.classList.add('active');
        }
        function hideLoader() {
            loader.classList.remove('active');
        }

        window.handleFileSelect = (input, wrapperId, textId) => {
            const wrapper = document.getElementById(wrapperId);
            const textEl = document.getElementById(textId);
            if (input.files && input.files[0]) {
                wrapper.classList.add('selected');
                textEl.innerHTML = `<i class="fa-solid fa-circle-check" style="color:#22c55e;"></i> Ready: ${input.files[0].name.substring(0, 12)}...`;
            }
        };

        if (!taskId) { window.location.href = 'home.html'; }

        async function loadTaskData() {
            showLoader("Fetching Mission Parameters...");
            try {
                const docSnap = await getDoc(doc(db, "tasks", taskId));
                if (!docSnap.exists()) { alert("Mission offline"); window.location.href='home.html'; return; }

                const data = docSnap.data();
                taskRewardAmount = parseFloat(data.reward || 0);
                taskNameString = data.name || "Premium Task";
                expectedImages = parseInt(data.imageProofCount || 0);

                document.getElementById('task-title').innerText = taskNameString;
                document.getElementById('task-reward').innerHTML = `<i class="fa-solid fa-circle-dollar-to-slot"></i> Reward: ৳ ${taskRewardAmount.toFixed(2)}`;
                document.getElementById('task-description').innerText = data.description || "Follow instructions carefully.";
                document.getElementById('task-limit').innerText = data.taskLimit || "Unlimited";
                
                if(data.image) document.getElementById('task-img').src = data.image;
                if(data.link) {
                    const lk = document.getElementById('task-link');
                    lk.href = data.link; lk.style.display = 'flex';
                }

                // কাউন্টিং ট্র্যাকিং এর জন্য চেক (orders এবং task_requests দুইটাই সেফ সাইড রাখার জন্য)
                const q = query(collection(db, "orders"), where("taskId", "==", taskId));
                const snap = await getDocs(q);
                document.getElementById('global-claims').innerText = snap.size;

                buildProofUI(expectedImages, data.textProofRequired);
                startTimer(15);

            } catch (e) { console.error(e); }
            finally { hideLoader(); }
        }

        function buildProofUI(imgCount, isText) {
            const container = document.getElementById('dynamic-proof-fields');
            container.innerHTML = '';
            let show = false;

            for(let i=1; i<=imgCount; i++) {
                show = true;
                const html = `
                    <div class="proof-group">
                        <label>SCREENSHOT PROOF ${i} *</label>
                        <div class="file-wrapper" id="wrap-${i}">
                            <span class="file-text" id="txt-${i}"><i class="fa-solid fa-image"></i> Choose Screenshot</span>
                            <input type="file" id="file-${i}" class="proof-img-inputs" accept="image/*" required onchange="window.handleFileSelect(this, 'wrap-${i}', 'txt-${i}')">
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', html);
            }

            if(isText === true || isText === "yes" || isText === "true") {
                show = true;
                const html = `
                    <div class="proof-group">
                        <label>REQUIRED TEXT (USERNAME / INFO) *</label>
                        <input type="text" id="proof-text-input" placeholder="Type info here..." required>
                    </div>`;
                container.insertAdjacentHTML('beforeend', html);
            }

            if(show) document.getElementById('proof-container').style.display = 'flex';
        }

        function startTimer(sec) {
            const btn = document.getElementById('claim-btn');
            const txt = document.getElementById('countdown-text');
            const timer = setInterval(() => {
                sec--;
                txt.innerText = `Securing data pipeline: ${sec}s`;
                if(sec <= 0) {
                    clearInterval(timer);
                    document.getElementById('timer-zone').style.display = 'none';
                    btn.removeAttribute('disabled');
                    btn.classList.add('active');
                }
            }, 1000);
        }

        const compressImage = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const MAX_WIDTH = 400;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);
                    resolve(compressedBase64);
                };
            };
        });

        document.getElementById('claim-btn').onclick = async () => {
            const txtInp = document.getElementById('proof-text-input');
            if(txtInp && !txtInp.value.trim()) { alert("Please input the required text!"); return; }

            const base64Images = [];
            for (let i = 1; i <= expectedImages; i++) {
                const fileInput = document.getElementById(`file-${i}`);
                if (!fileInput || !fileInput.files[0]) {
                    alert(`Please select Screenshot ${i}!`);
                    return;
                }
                showLoader(`Optimizing Screenshot ${i}...`);
                const compressedStr = await compressImage(fileInput.files[0]);
                base64Images.push(compressedStr);
            }

            showLoader("Submitting Encrypted Node Data...");

            try {
                const textProofVal = txtInp ? txtInp.value.trim() : "";

                // ফিক্স ১: অ্যাডমিন প্যানেলের জন্য task_requests কালেকশনে ডাটা সাবমিট (পেন্ডিং স্ট্যাটাস সহ)
                await addDoc(collection(db, "task_requests"), {
                    userId: userId,
                    taskId: taskId,
                    taskName: taskNameString,
                    reward: taskRewardAmount,
                    textProof: textProofVal,
                    images: base64Images,
                    status: "pending",
                    submittedAt: serverTimestamp()
                });

                // ফিক্স ২: হিস্ট্রি পেজ (order.html) এবং হোম পেজ ফিল্টারিং এর জন্য orders কালেকশনে সেম ডাটা পুশ
                await addDoc(collection(db, "orders"), {
                    userId: userId,
                    taskId: taskId,
                    taskName: taskNameString,
                    amount: taskRewardAmount,
                    textProof: textProofVal,
                    screenshot1: base64Images[0] || "", // প্রথম স্ক্রিনশট
                    screenshot2: base64Images[1] || "", // দ্বিতীয় স্ক্রিনশট (যদি থাকে)
                    status: "pending", // হিস্ট্রি পেজেও পেন্ডিং স্ট্যাটাস দেখাবে
                    claimedAt: serverTimestamp()
                });

                alert("Proof Submitted successfully! Waiting for Admin verification.");
                window.location.href = 'home.html';
            } catch(e) { 
                console.error(e); 
                alert("Submission failed! Contact support."); 
            } finally { 
                hideLoader(); 
            }
        };

        loadTaskData();
    </script>
</body>
</html>
