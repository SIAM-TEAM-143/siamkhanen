<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAR TASK - Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; padding: 0; display: flex; justify-content: center; 
        }
        .container { 
            width: 100%; max-width: 360px; 
            background: #ffffff; min-height: 100vh; position: relative; 
            box-shadow: 0 0 15px rgba(0,0,0,0.05); 
        }
        .header { 
            background-color: #00a651; color: white; padding: 40px 20px;
            text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }
        .header i { font-size: 50px; margin-bottom: 10px; }
        .header h2 { margin: 0; font-size: 22px; }

        .form-section { padding: 25px 20px; }
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
        .input-group input { 
            width: 100%; padding: 12px 12px 12px 40px; border: 1px solid #ddd; 
            border-radius: 10px; box-sizing: border-box; font-size: 15px; outline: none; 
        }
        .input-group i.input-icon { position: absolute; left: 12px; top: 35px; color: #00a651; }
        
        .err-msg { color: #f44336; font-size: 11px; margin-top: 4px; display: none; font-weight: 600; }

        .btn-register { 
            width: 100%; background: #00a651; color: white; border: none; 
            padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
            box-shadow: 0 4px 12px rgba(0,166,81,0.2);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-register:active { transform: scale(0.98); }
        .btn-register:disabled { background: #66bb6a; cursor: not-allowed; }

        .footer-links { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .footer-links a { color: #00a651; text-decoration: none; font-weight: bold; cursor: pointer; }

        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
        }
        .loader-container { display: flex; flex-direction: column; align-items: center; gap: 25px; }
        .proc-9 { 
            width: 80px; height: 80px; position: relative; border: 2px solid rgba(0, 200, 83, 0.1); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #fff;
        }
        .loader-img { width: 45px; height: 45px; filter: drop-shadow(0 5px 10px rgba(0, 200, 83, 0.5)); }
        .proc-9::before { 
            content: ""; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; 
            border: 3px solid #00c853; border-radius: 50%; animation: trace 2s linear infinite; clip-path: inset(0 0 95% 0); 
        }
        .proc-3 { color: #00c853; font-weight: bold; font-size: 20px; }
        .proc-3:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes trace { 0% { clip-path: inset(0 0 95% 0); } 25% { clip-path: inset(0 95% 0 0); } 50% { clip-path: inset(95% 0 0 0); } 75% { clip-path: inset(0 0 0 95%); } 100% { clip-path: inset(0 0 95% 0); } }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: #00c853; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 #00c853, 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 #00c853, 1em 0 0 #00c853; } }
    </style>
</head>
<body>

<div id="loader-overlay">
    <div class="loader-container">
        <div class="proc-9"><img src="task.png" class="loader-img"></div>
        <span class="proc-3">Processing</span>
    </div>
</div>

<div class="container">
    <div class="header">
        <i class="fa-solid fa-user-plus"></i>
        <h2>Create Account</h2>
        <p style="font-size: 12px; opacity: 0.9;">Join us and start earning today</p>
    </div>

    <div class="form-section">
        <div class="input-group">
            <label>Full Name</label>
            <i class="fa-solid fa-user input-icon"></i>
            <input type="text" id="name" placeholder="Enter your name">
            <div id="name-err" class="err-msg"></div>
        </div>

        <div class="input-group">
            <label>Email Address</label>
            <i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" id="email" placeholder="example@mail.com">
            <div id="email-err" class="err-msg"></div>
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <i class="fa-solid fa-phone input-icon"></i>
            <input type="tel" id="phone" placeholder="017XXXXXXXX">
            <div id="phone-err" class="err-msg"></div>
        </div>

        <div class="input-group">
            <label>Password</label>
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="password" placeholder="Min 6 characters">
            <div id="password-err" class="err-msg"></div>
        </div>

        <div class="input-group">
            <label>Refer Code (Optional)</label>
            <i class="fa-solid fa-share-nodes input-icon"></i>
            <input type="text" id="refer" placeholder="Enter refer code">
        </div>

        <button class="btn-register" id="regBtn" onclick="handleRegister()">SIGN UP</button>

        <div class="footer-links">
            Already have an account? <a onclick="navigateTo('login.html')">Login</a>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, query, where, getDocs, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbyV4futjEJjdAbR3dMNf6dOIhAuj7tTo",
        authDomain: "task-2503d.firebaseapp.com",
        databaseURL: "https://task-2503d-default-rtdb.firebaseio.com",
        projectId: "task-2503d",
        storageBucket: "task-2503d.firebasestorage.app",
        messagingSenderId: "707479242322",
        appId: "1:707479242322:web:492db72a3b86653a0d018b",
        measurementId: "G-8DJWDEFEXD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    function generateNumericUID() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }

    function generateUniqueReferCode() {
        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let randomPart = "";
        for (let i = 0; i < 5; i++) {
            randomPart += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return `R${randomPart}G1`; 
    }

    window.handleRegister = async () => {
        document.querySelectorAll('.err-msg').forEach(e => e.style.display = "none");
        
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value.trim();
        
        // কেস-সেন্সিটিভিটি ফিক্স: কোড যাই টাইপ করুক, বড় হাতের অক্ষরে কনভার্ট হবে
        const referInput = document.getElementById('refer').value.trim();
        const refer = referInput ? referInput.toUpperCase() : "direct";
        
        const btn = document.getElementById('regBtn');

        if (!name || !email || !phone || !password) {
            alert("Please fill in all fields.");
            return;
        }

        if (password.length < 6) {
            showError('password-err', "Password must be at least 6 characters.");
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';

        try {
            // ১. ফোন নাম্বার ডুপ্লিকেট চেক
            const qPhone = query(collection(db, "users"), where("phone", "==", phone));
            const snapPhone = await getDocs(qPhone);
            
            if (!snapPhone.empty) {
                showError('phone-err', "This phone number is already registered.");
                btn.disabled = false;
                btn.innerHTML = "SIGN UP";
                return;
            }

            // ২. Firebase Auth ইউজার ক্রিয়েশন
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // ৩. নতুন ইউজারের প্রোফাইল ডাটা জেনারেট
            const myNewReferCode = generateUniqueReferCode();
            const userUID = generateNumericUID();

            // Firestore-এ সাবমিট
            await setDoc(doc(db, "users", user.uid), {
                uid: userUID,
                auth_id: user.uid,
                name: name, 
                email: email, 
                phone: phone, 
                password: password, 
                referBy: refer,
                myReferCode: myNewReferCode,
                balance: 5.00,
                todayIncome: 0.00,
                totalIncome: 0.00,
                todayReferBonusFromThisUser: 0.00, 
                totalReferBonusFromThisUser: 0.00, 
                status: "unverified",
                joinedAt: Timestamp.now()
            });
            
            // সেশন সেট করা
            localStorage.setItem('currentUserId', user.uid);
            localStorage.setItem('userUID', userUID);
            
            btn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Success!';
            btn.style.backgroundColor = "#2e7d32";

            setTimeout(() => {
                document.getElementById('loader-overlay').style.display = 'flex';
                setTimeout(() => { window.location.href = 'home.html'; }, 1500);
            }, 1000);

        } catch (error) {
            let errorMsg = error.message;
            if (error.code === 'auth/email-already-in-use') {
                showError('email-err', "This email is already registered.");
            } else {
                alert("Error: " + errorMsg);
            }
            btn.disabled = false;
            btn.innerHTML = "SIGN UP";
        }
    };

    function showError(id, msg) {
        const el = document.getElementById(id);
        el.innerText = msg;
        el.style.display = "block";
    }

    window.navigateTo = (page) => {
        document.getElementById('loader-overlay').style.display = 'flex';
        setTimeout(() => { window.location.href = page; }, 500);
    };
</script>

</body>
</html>
